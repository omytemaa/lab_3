name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags:
      - "v*" # пуш тега запускает релиз
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y g++ make dpkg-dev
      - run: chmod +x cicd/*.sh
      - run: ./cicd/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lab2-binary
          path: src/lab2

  test:
    name: 🧪 Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x cicd/*.sh
      - uses: actions/download-artifact@v4
        with:
          name: lab2-binary
          path: src/
      - run: chmod +x src/lab2
      - run: ./cicd/test.sh

  package:
    name: 📦 Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x cicd/*.sh
      - uses: actions/download-artifact@v4
        with:
          name: lab2-binary
          path: src/
      - run: chmod +x src/lab2
      - run: ./cicd/package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: lab2-var11-1.0.0.deb

  docker:
    name: 🐳 Docker Build
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: lab2-local:latest
      - run: docker images | grep lab2-local

  release:
    name: 🚀 Release
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .

      - name: Show package
        run: |
          echo "🎉 Релиз job сработала!"
          ls -lh ./lab2-var11-1.0.0.deb
