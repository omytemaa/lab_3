name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make dpkg-dev

      - name: Run build script
        run: ./cicd/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab3-binary          # ← ИСПРАВЛЕНО: lab3 вместо lab2
          path: src/lab3              # ← ИСПРАВЛЕНО: lab3 вместо lab2

  test:
    name: 🧪 Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lab3-binary          # ← ИСПРАВЛЕНО: lab3 вместо lab2
          path: src/

      - name: Make binary executable
        run: chmod +x src/lab3       # ← ИСПРАВЛЕНО: lab3 вместо lab2

      - name: Run tests
        run: ./cicd/test.sh

  package:
    name: 📦 Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lab3-binary          # ← ИСПРАВЛЕНО: lab3 вместо lab2
          path: src/

      - name: Make binary executable
        run: chmod +x src/lab3       # ← ИСПРАВЛЕНО: lab3 вместо lab2

      - name: Install packaging tools
        run: sudo apt-get install -y dpkg-dev

      - name: Build deb package
        run: ./cicd/package.sh

      - name: Upload deb package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: lab3-*.deb            # ← ИСПРАВЛЕНО: lab3-*.deb (вместо lab2-var11-*.deb)

  docker:
    name: 🐳 Docker Build
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: 🚀 Release
    needs: [package, docker]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./lab3-1.0.0.deb        # ← ИСПРАВЛЕНО: lab3-1.0.0.deb
          asset_name: lab3-1.0.0.deb          # ← ИСПРАВЛЕНО: lab3-1.0.0.deb
          asset_content_type: application/vnd.debian.binary-package
